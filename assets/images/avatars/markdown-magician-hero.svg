<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="250" cy="250" r="250" fill="url(#bgGradient)"/>
  
  <!-- Head -->
  <circle cx="250" cy="180" r="80" fill="#FFD700"/>
  
  <!-- Eyes -->
  <circle cx="230" cy="170" r="8" fill="#1F2937"/>
  <circle cx="270" cy="170" r="8" fill="#1F2937"/>
  
  <!-- Hat/Wizard theme -->
  <path d="M 250 80 L 220 130 L 280 130 Z" fill="#7C3AED"/>
  <circle cx="250" cy="75" r="15" fill="#FFD700" stroke="#7C3AED" stroke-width="3"/>
  
  <!-- Smile -->
  <path d="M 230 200 Q 250 215 270 200" stroke="#1F2937" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Body -->
  <rect x="180" y="270" width="140" height="150" rx="20" fill="#C4B5FD"/>
  
  <!-- Wand -->
  <line x1="320" y1="220" x2="380" y2="120" stroke="#7C3AED" stroke-width="8" stroke-linecap="round"/>
  <circle cx="385" cy="110" r="12" fill="#FFD700"/>
  <circle cx="385" cy="110" r="8" fill="#FF6B6B"/>
  
  <!-- Arms -->
  <rect x="60" y="280" width="120" height="40" rx="20" fill="#FFD700"/>
  <rect x="320" y="280" width="120" height="40" rx="20" fill="#FFD700"/>
  
  <!-- Text overlay -->
  <text x="250" y="460" font-size="32" font-weight="bold" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif">
    Markdown Magician
  </text>
</svg>
