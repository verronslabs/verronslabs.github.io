<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .fill-purple { fill: #7C3AED; }
      .fill-white { fill: #FFFFFF; }
      .fill-skin { fill: #F4D5C0; }
      .fill-hair { fill: #1F2937; }
      .fill-accent { fill: #3B82F6; }
      .stroke-purple { stroke: #1F2937; stroke-width: 2; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="500" fill="#FAFAFA"/>
  
  <!-- Shoes -->
  <ellipse cx="130" cy="450" rx="25" ry="12" class="fill-white stroke-purple"/>
  <ellipse cx="270" cy="450" rx="25" ry="12" class="fill-white stroke-purple"/>
  <path d="M 130 460 L 130 480 Q 130 485 135 485 L 125 485 Q 130 485 130 480" class="fill-white stroke-purple"/>
  <path d="M 270 460 L 270 480 Q 270 485 275 485 L 265 485 Q 270 485 270 480" class="fill-white stroke-purple"/>
  
  <!-- Legs -->
  <line x1="140" y1="380" x2="130" y2="450" class="stroke-purple"/>
  <line x1="260" y1="380" x2="270" y2="450" class="stroke-purple"/>
  
  <!-- Dress pattern -->
  <g class="fill-purple" opacity="0.15">
    <rect x="120" y="200" width="160" height="180" rx="10"/>
  </g>
  
  <!-- Dress body -->
  <path d="M 140 200 L 260 200 Q 280 200 290 220 L 280 380 Q 200 400 120 380 L 110 220 Q 120 200 140 200" class="fill-white stroke-purple"/>
  
  <!-- Dress pattern details -->
  <g class="fill-purple" opacity="0.2">
    <circle cx="150" cy="220" r="3"/>
    <circle cx="170" cy="235" r="3"/>
    <circle cx="200" cy="225" r="3"/>
    <circle cx="230" cy="240" r="3"/>
    <circle cx="250" cy="220" r="3"/>
    <circle cx="160" cy="260" r="3"/>
    <circle cx="190" cy="270" r="3"/>
    <circle cx="230" cy="265" r="3"/>
    <circle cx="155" cy="310" r="3"/>
    <circle cx="200" cy="320" r="3"/>
    <circle cx="245" cy="310" r="3"/>
    <circle cx="175" cy="350" r="3"/>
    <circle cx="225" cy="355" r="3"/>
  </g>
  
  <!-- Dress buttons -->
  <circle cx="200" cy="240" r="4" class="fill-accent"/>
  <circle cx="200" cy="290" r="4" class="fill-accent"/>
  <circle cx="200" cy="340" r="4" class="fill-accent"/>
  
  <!-- Belt -->
  <rect x="130" y="280" width="140" height="12" class="fill-purple"/>
  <circle cx="200" cy="286" r="8" class="fill-accent"/>
  
  <!-- Arms -->
  <line x1="130" y1="220" x2="100" y2="280" class="stroke-purple" stroke-linecap="round" stroke-width="18"/>
  <line x1="270" y1="220" x2="300" y2="280" class="stroke-purple" stroke-linecap="round" stroke-width="18"/>
  
  <!-- Hands -->
  <circle cx="100" cy="280" r="14" class="fill-skin stroke-purple"/>
  <circle cx="300" cy="280" r="14" class="fill-skin stroke-purple"/>
  
  <!-- Phone in hand -->
  <rect x="285" y="265" width="24" height="40" rx="3" class="fill-accent stroke-purple"/>
  <rect x="287" y="268" width="20" height="32" class="fill-white"/>
  <circle cx="297" cy="308" r="2" class="fill-purple"/>
  
  <!-- Neck -->
  <rect x="180" y="160" width="40" height="40" class="fill-skin stroke-purple"/>
  
  <!-- Head -->
  <circle cx="200" cy="130" r="40" class="fill-skin stroke-purple"/>
  
  <!-- Hair -->
  <path d="M 160 100 Q 160 70 200 70 Q 240 70 240 100 L 240 140 Q 200 155 160 140 Z" class="fill-hair"/>
  <path d="M 165 85 Q 165 75 200 75 Q 235 75 235 85" class="fill-hair"/>
  
  <!-- Eyes -->
  <circle cx="185" cy="120" r="5" class="fill-white stroke-purple"/>
  <circle cx="215" cy="120" r="5" class="fill-white stroke-purple"/>
  <circle cx="186" cy="122" r="3" class="fill-hair"/>
  <circle cx="216" cy="122" r="3" class="fill-hair"/>
  
  <!-- Smile -->
  <path d="M 190 135 Q 200 140 210 135" stroke="#1F2937" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Earring -->
  <circle cx="165" cy="125" r="3" class="fill-accent"/>
</svg>